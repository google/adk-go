# vLLM server with Qwen3.5-4B for ADK Go OpenAI adapter
#
# Prerequisites:
#   - Docker Desktop (handles WSL2 backend automatically)
#   - NVIDIA Container Toolkit (for GPU passthrough)
#
# Usage:
#   cp .env.example .env   # optional: customize settings
#   docker compose up -d
#   curl http://localhost:8000/health
#
# First startup downloads ~3GB model — subsequent starts use cached weights.

services:
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command:
      - --model=${VLLM_MODEL:-Qwen/Qwen3.5-4B}
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-8192}
      - --gpu-memory-utilization=${VLLM_GPU_MEM_UTIL:-0.90}
      - --enable-auto-tool-choice
      - --tool-call-parser=qwen3_coder
      - --reasoning-parser=qwen3
      - --speculative-config={"method":"mtp","num_speculative_tokens":${VLLM_MTP_TOKENS:-1}}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  hf-cache:
